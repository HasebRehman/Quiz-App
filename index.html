<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="multiple-choice-quiz-container">
        <div class="msg-container hide">
            <div class="msg">This is data</div>
        </div>
        <div class="main-head">
            <h1>Multiple Choice Quiz</h1>
        </div>
        <div class="question">
            <h3 id="question-1"></h3>
        </div>
        <div class="four-options">
            <button id="opt-1"></button>
            <button id="opt-2"></button>
            <button id="opt-3"></button>
            <button id="opt-4"></button>
        </div>
        <div class="give-up">
            <button>GIVE UP</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
